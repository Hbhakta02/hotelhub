<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HotelHub | In-House</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/navbar.css" />
  <link rel="stylesheet" href="css/inHouse.css" />
</head>
<body class="inhouse-page">
  <div class="app-layout">
    <main class="main-content">
      <section class="inhouse-shell">
        <div class="inhouse-panel">
          <div class="inhouse-content-wrap">
            <section class="filters inhouse-filters">
              <div class="filters__left">
                <input id="search" class="filter-input" placeholder="Search room number..." />

                <select id="statusFilter" class="filter-select">
                  <option value="all">All Status</option>
                  <option value="clean">Clean</option>
                  <option value="dirty">Dirty</option>
                  <option value="occupied">Occupied</option>
                  <option value="ooo">OOO</option>
                </select>

                <select id="typeFilter" class="filter-select">
                  <option value="all">All Types</option>
                </select>
              </div>

              <div id="summary" class="filters__summary"></div>
            </section>

            <main id="grid" class="guest-grid"></main>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="inhouseGuestModal" class="inhouse-modal hidden" aria-hidden="true">
    <div class="inhouse-modal__backdrop" data-close-modal="true"></div>
    <div class="inhouse-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="inhouseGuestModalTitle">
      <div class="inhouse-modal__header">
        <div>
          <h3 id="inhouseGuestModalTitle">Guest Details</h3>
          <p id="inhouseGuestModalSubtitle">Current stay details</p>
        </div>
        <button id="inhouseGuestModalClose" class="inhouse-modal__close" type="button" aria-label="Close">×</button>
      </div>

      <div id="inhouseGuestModalBody" class="inhouse-modal__body"></div>
      <div class="inhouse-modal__footer">
        <p id="inhouseGuestModalFeedback" class="inhouse-modal__feedback hidden" role="status" aria-live="polite"></p>
        <div class="inhouse-modal__actions">
          <button id="inhousePrintReceiptBtn" class="secondary-btn" type="button">Print Receipt</button>
          <button id="inhouseCheckoutEarlyBtn" class="secondary-btn" type="button">Check Out Early</button>
          <button id="inhouseSaveChangesBtn" class="primary-btn" type="button">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/global.js"></script>
  <script src="js/inHouse.js"></script>
</body>
</html>
